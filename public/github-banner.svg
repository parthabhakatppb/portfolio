<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07090e" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#07090e" />
    </linearGradient>

    <!-- Neon Cyan & Violet Text Gradients -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#9d4edd" />
      <stop offset="100%" stop-color="#00f0ff">
        <animate attributeName="offset" values="1;0;1" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00f0ff" stroke-width="0.3" stroke-opacity="0.15" />
    </pattern>

    <!-- Neural Node Radial -->
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="1" />
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&amp;family=Outfit:wght@600;800&amp;display=swap');

    .bg { fill: url(#bg-grad); }
    .grid-layer { fill: url(#grid); }
    
    .title {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-weight: 800;
      font-size: 42px;
      fill: url(#text-grad);
      letter-spacing: 2px;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 15px;
      fill: #e2e8f0;
      letter-spacing: 3px;
    }

    .status-text {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 12px;
      fill: #00f0ff;
      letter-spacing: 2px;
    }

    .code-tag {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 13px;
      fill: #94a3b8;
    }

    /* CSS Animations */
    @keyframes pulse-fast {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.85); }
    }

    @keyframes pulse-slow {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.2; }
    }

    @keyframes float-node-1 {
      0%, 100% { transform: translate(0px, 0px); }
      50% { transform: translate(15px, -12px); }
    }

    @keyframes float-node-2 {
      0%, 100% { transform: translate(0px, 0px); }
      50% { transform: translate(-18px, 15px); }
    }

    @keyframes float-node-3 {
      0%, 100% { transform: translate(0px, 0px); }
      50% { transform: translate(12px, 18px); }
    }

    @keyframes scan-line {
      0% { transform: translateY(-300px); opacity: 0; }
      50% { opacity: 0.4; }
      100% { transform: translateY(300px); opacity: 0; }
    }

    @keyframes data-stream {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }

    .dot-green { animation: pulse-fast 1.5s infinite ease-in-out; transform-origin: 195px 48px; }
    .node-1 { animation: float-node-1 7s infinite ease-in-out; }
    .node-2 { animation: float-node-2 9s infinite ease-in-out; }
    .node-3 { animation: float-node-3 8s infinite ease-in-out; }
    .node-pulse { animation: pulse-slow 3s infinite ease-in-out; }
    .scan { animation: scan-line 6s infinite linear; }
    .signal-line {
      stroke-dasharray: 8 12;
      animation: data-stream 4s infinite linear;
    }
  </style>

  <!-- Base Background & Border -->
  <rect width="850" height="280" rx="20" class="bg" />
  <rect width="850" height="280" rx="20" class="grid-layer" />
  <rect width="848" height="278" x="1" y="1" rx="19" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.3" filter="url(#glow-soft)" />

  <!-- Animated Scanner Bar -->
  <rect width="850" height="4" fill="url(#cyan-glow)" class="scan" opacity="0.5" />

  <!-- ── NEURAL NETWORK BACKDROP (RIGHT SIDE & CORNERS) ── -->
  <g opacity="0.65">
    <!-- Signal Connection Lines -->
    <g stroke="#00f0ff" stroke-width="1" stroke-opacity="0.25">
      <line x1="620" y1="60" x2="720" y2="90" class="node-1" />
      <line x1="720" y1="90" x2="780" y2="50" class="node-2" />
      <line x1="720" y1="90" x2="680" y2="180" class="node-1" />
      <line x1="680" y1="180" x2="790" y2="170" class="node-3" />
      <line x1="680" y1="180" x2="610" y2="220" class="node-1" />
      <line x1="790" y1="170" x2="810" y2="230" class="node-2" />
      <line x1="530" y1="80" x2="620" y2="60" class="node-3" />
      <line x1="530" y1="80" x2="570" y2="160" class="node-2" />
      <line x1="570" y1="160" x2="680" y2="180" class="node-1" />
    </g>

    <!-- Animated Data Stream Packets on Lines -->
    <g stroke="#9d4edd" stroke-width="2" stroke-opacity="0.8" fill="none" class="signal-line">
      <line x1="620" y1="60" x2="720" y2="90" />
      <line x1="680" y1="180" x2="790" y2="170" />
      <line x1="530" y1="80" x2="570" y2="160" />
    </g>

    <!-- Floating Neural Nodes -->
    <g class="node-1">
      <circle cx="620" cy="60" r="18" fill="url(#node-glow)" />
      <circle cx="620" cy="60" r="4" fill="#00f0ff" filter="url(#glow-soft)" />
      <circle cx="680" cy="180" r="24" fill="url(#node-glow)" />
      <circle cx="680" cy="180" r="5" fill="#00f0ff" filter="url(#glow-heavy)" />
    </g>

    <g class="node-2">
      <circle cx="720" cy="90" r="20" fill="url(#node-glow)" />
      <circle cx="720" cy="90" r="4.5" fill="#9d4edd" filter="url(#glow-soft)" />
      <circle cx="790" cy="170" r="16" fill="url(#node-glow)" />
      <circle cx="790" cy="170" r="3.5" fill="#00f0ff" />
      <circle cx="810" cy="230" r="14" fill="url(#node-glow)" />
      <circle cx="810" cy="230" r="3" fill="#9d4edd" />
    </g>

    <g class="node-3">
      <circle cx="780" cy="50" r="15" fill="url(#node-glow)" />
      <circle cx="780" cy="50" r="3" fill="#00f0ff" />
      <circle cx="530" cy="80" r="16" fill="url(#node-glow)" />
      <circle cx="530" cy="80" r="3.5" fill="#9d4edd" filter="url(#glow-soft)" />
      <circle cx="610" cy="220" r="18" fill="url(#node-glow)" />
      <circle cx="610" cy="220" r="4" fill="#00f0ff" />
      <circle cx="570" cy="160" r="15" fill="url(#node-glow)" />
      <circle cx="570" cy="160" r="3" fill="#00f0ff" />
    </g>
  </g>

  <!-- ── STATUS BADGE ── -->
  <g transform="translate(50, 36)">
    <!-- Pill background -->
    <rect x="0" y="0" width="310" height="26" rx="13" fill="#00f0ff" fill-opacity="0.1" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.4" />
    <!-- Blinking Green Dot -->
    <circle cx="16" cy="13" r="4.5" fill="#4ade80" class="dot-green" filter="url(#glow-soft)" />
    <text x="32" y="17.5" class="status-text">OPEN TO FULL-TIME ML/AI ROLES</text>
  </g>

  <!-- ── MAIN TITLE & SUBTITLE ── -->
  <g transform="translate(50, 110)">
    <text x="0" y="25" class="title" filter="url(#glow-soft)">PARTHA PRATIM BHAKAT</text>
    <text x="0" y="62" class="subtitle">MACHINE LEARNING ENGINEER &amp; AI ARCHITECT</text>
  </g>

  <!-- ── CODE TERMINAL PILLS ── -->
  <g transform="translate(50, 205)">
    <!-- Pill 1: PyTorch / Deep Learning -->
    <g transform="translate(0, 0)">
      <rect width="185" height="32" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15" />
      <circle cx="16" cy="16" r="3" fill="#00f0ff" />
      <text x="30" y="20.5" class="code-tag">PyTorch &amp; TF Core</text>
    </g>
    <!-- Pill 2: Vision Transformers -->
    <g transform="translate(200, 0)">
      <rect width="200" height="32" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15" />
      <circle cx="16" cy="16" r="3" fill="#9d4edd" />
      <text x="30" y="20.5" class="code-tag">Vision Transformers</text>
    </g>
    <!-- Pill 3: Full-Stack Next.js -->
    <g transform="translate(415, 0)">
      <rect width="185" height="32" rx="8" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15" />
      <circle cx="16" cy="16" r="3" fill="#4ade80" />
      <text x="30" y="20.5" class="code-tag">Next.js 16 &amp; R3F</text>
    </g>
  </g>
</svg>
